name: Run Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: تحميل الملفات
        uses: actions/checkout@v3

      - name: تثبيت بايثون
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: تثبيت المكتبات
        run: pip install -r requirements.txt

      - name: تشغيل البوت
        run: python bot.py